apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-app
  template:
    metadata:
      labels:
        app: mongo-app
    # containers inside pod 
    spec:
      containers:
        - name: mongo-app
          image: mongo:7
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-pvc


---
apiVersion: v1
kind: Service
metadata:
  name: service-mongo-app
spec:
  selector:
    app: mongo-app
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017


      