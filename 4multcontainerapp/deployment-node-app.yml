apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-webapp
  template:
    metadata:
      labels:
        app: my-webapp
    # containers inside pod 
    spec:
      containers:
      - name: my-webapp
        image: prashantbhati7/mongoconnectionwebapp:01
        ports:
        - containerPort: 3000

      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017